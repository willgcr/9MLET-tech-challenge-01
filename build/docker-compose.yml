services:
  churn-api:
    build:
      context: ..
      dockerfile: build/Dockerfile
    image: churn-api:latest
    container_name: churn-api
    ports:
      - "127.0.0.1:8899:8000"
    environment:
      LOG_FORMAT: ${LOG_FORMAT:-json}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8000/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
